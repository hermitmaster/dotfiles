# Terminal + behavior
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Vim-aware Ctrl+h/j/k/l pane navigation (mirrors wezterm.lua).
# Sends the keystroke through when nvim/helix is focused; otherwise selects the pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|hx)$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Splits — same shortcuts as wezterm.lua
# Ctrl-/  -> split below at 20%, inherits cwd
bind-key -n 'C-_' split-window -v -l 20% -c "#{pane_current_path}"
bind-key -n 'C-/' split-window -v -l 20% -c "#{pane_current_path}"
# Ctrl-\  -> split right at 30% running claude through direnv
bind-key -n 'C-\\' split-window -h -l 30% \
    "/bin/zsh -lic 'eval \"$(direnv export zsh)\" && exec claude'"

# Status line — Tokyo Night Moon, wezterm-style tab bar at bottom
set -g status-position bottom
set -g status-style "bg=#1e2030"
set -g status-interval 5
set -g status-left ""
set -g status-right ""
set -g window-status-separator ""
setw -g monitor-bell on
set -g visual-bell off
# Inactive tab: dim; flares yellow when Claude rings the bell
set -g window-status-format "#{?window_bell_flag,#[bg=#ffc777 fg=#1e2030 bold],#[bg=#1e2030 fg=#636da6]} #{pane_current_path} │ #{pane_current_command} "
# Active tab: lighter bg, blue path, green command
set -g window-status-current-format "#[bg=#2f334d,fg=#82aaff,bold] #{pane_current_path}#[fg=#c8d3f5,nobold] │ #[fg=#c3e88d]#{pane_current_command} "

# Window switching — Ghostty sends Esc+{ / Esc+} on Cmd+Shift+[/]
bind-key -n 'M-{' previous-window
bind-key -n 'M-}' next-window
