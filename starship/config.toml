# Starship config replicating Powerlevel10k lean-8colors style
# Based on: lean_8colors, 1 line, sparse, few icons, concise

format = """
[]()\
$directory\
$git_branch\
$git_status\
$character"""

right_format = """\
$status\
$cmd_duration\
$jobs\
$direnv\
$python\
$golang\
$kubernetes\
$terraform\
$container\
$username\
$hostname"""

# Add newline before prompt
add_newline = true

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vicmd_symbol = '[❮](bold green)'

[directory]
style = 'bold blue'
truncation_length = 0
truncate_to_repo = false
truncation_symbol = ''
read_only = ' '
read_only_style = 'bold blue'
format = '[$path]($style)[$read_only]($read_only_style) '

# Shorten directories intelligently
fish_style_pwd_dir_length = 0
use_logical_path = true

[directory.substitutions]

[git_branch]
symbol = ''
style = 'bold green'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
format = '([($conflicted$deleted$renamed)($modified$staged)($untracked)($ahead_behind)($stashed)]($style) )'
style = 'bold green'
conflicted = '[~$count](bold red)'
deleted = ''
renamed = ''
modified = '[!$count](bold yellow)'
staged = '[+$count](bold yellow)'
untracked = '[?$count](bold blue)'
stashed = '[*$count](bold green)'
ahead = '[⇡$count](bold green)'
behind = '[⇣$count](bold green)'
diverged = '[⇣$behind_count⇡$ahead_count](bold green)'

[status]
style = 'bold red'
symbol = '✘'
success_symbol = ''
format = '[$symbol$status]($style) '
disabled = false

[cmd_duration]
min_time = 2_000
style = 'bold yellow'
format = '[$duration]($style) '

[jobs]
symbol = ''
style = 'bold blue'
number_threshold = 1
symbol_threshold = 1
format = '[$symbol$number]($style) '

[python]
symbol = ' '
style = 'bold yellow'
format = '[$symbol$virtualenv]($style) '
pyenv_version_name = false
pyenv_prefix = 'pyenv '
detect_extensions = ['py']
detect_files = ['.python-version', 'Pipfile', '__pycache__', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini']
detect_folders = []

[golang]
symbol = ' '
style = 'bold cyan'
format = '[$symbol$version]($style) '
detect_extensions = ['go']
detect_files = ['go.mod', 'go.sum', 'go.work', 'glide.yaml', 'Gopkg.yml', 'Gopkg.lock', '.go-version']
detect_folders = ['Godeps']

[kubernetes]
symbol = '☸ '
style = 'bold blue'
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = []

[kubernetes.context_aliases]

[terraform]
symbol = '💠 '
style = 'bold purple'
format = '[$symbol$workspace]($style) '
detect_extensions = ['tf', 'tfplan', 'tfstate']
detect_files = []
detect_folders = ['.terraform']

[container]
symbol = '⬢ '
style = 'bold red dimmed'
format = '[$symbol$name]($style) '

[username]
style_user = 'bold yellow'
style_root = 'bold red'
format = '[$user]($style)'
show_always = false
disabled = false

# Disable modules not in P10K config
[aws]
disabled = true

[azure]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true
