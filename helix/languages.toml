# Mirrors LazyVim language extras: go, python, terraform, helm, docker,
# json, yaml, toml, typescript, markdown, bash. Reuses LSPs/formatters
# installed via Mason under ~/.local/share/nvim/mason/bin.

# ---------- Python ----------
# Use pyright for type-checking + ruff for lint/format (matches LazyVim).
# Overrides Helix's default `ty` which isn't installed.
[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"
autoSearchPaths = true
diagnosticMode = "openFilesOnly"
useLibraryCodeForTypes = true

[language-server.ruff]
command = "ruff"
args = ["server"]

[[language]]
name = "python"
language-servers = ["pyright", "ruff"]
auto-format = true
formatter = { command = "ruff", args = ["format", "--stdin-filename", "file.py", "-"] }

# ---------- TypeScript / JavaScript ----------
# typescript-language-server isn't on PATH; use vtsls (installed via Mason).
[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

[[language]]
name = "typescript"
language-servers = ["vtsls"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "tsx"
language-servers = ["vtsls"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "javascript"
language-servers = ["vtsls"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }

[[language]]
name = "jsx"
language-servers = ["vtsls"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }

# ---------- Go ----------
[language-server.gopls.config]
gofumpt = true
"formatting.gofumpt" = true
hints = { assignVariableTypes = true, compositeLiteralFields = true, constantValues = true, functionTypeParameters = true, parameterNames = true, rangeVariableTypes = true }

[[language]]
name = "go"
auto-format = true

# ---------- Terraform ----------
[[language]]
name = "hcl"
language-servers = ["terraform-ls"]
auto-format = true
language-id = "terraform"

[[language]]
name = "tfvars"
language-servers = ["terraform-ls"]
auto-format = true
language-id = "terraform-vars"

# ---------- Markdown / YAML / JSON / TOML: prettier ----------
[[language]]
name = "markdown"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "markdown"] }

[[language]]
name = "yaml"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }

[[language]]
name = "json"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "json"] }

[[language]]
name = "toml"
auto-format = true
formatter = { command = "taplo", args = ["fmt", "-"] }

# ---------- Bash ----------
[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = ["-i", "2", "-ci"] }

# ---------- Lua ----------
[[language]]
name = "lua"
auto-format = true
formatter = { command = "stylua", args = ["-"] }

# ---------- Helm / Docker / Docker Compose ----------
# LSPs auto-detected by Helix; just ensure auto-format isn't disruptive.
[[language]]
name = "helm"
auto-format = false

[[language]]
name = "dockerfile"
auto-format = false

[[language]]
name = "docker-compose"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }
