theme = "tokyonight"

[editor]
line-number = "relative"
cursorline = true
mouse = true
scrolloff = 4
bufferline = "multiple"
color-modes = true
auto-format = true
auto-save = false
completion-trigger-len = 1
true-color = true
undercurl = true
rulers = [80, 120]
idle-timeout = 250
popup-border = "all"
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator", "read-only-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.lsp]
display-messages = true
display-inlay-hints = true
display-progress-messages = true

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.soft-wrap]
enable = false

[editor.whitespace.render]
tab = "all"
nbsp = "all"
nnbsp = "all"

[editor.smart-tab]
enable = true
supersede-menu = false

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

# Window navigation — mirrors Navigator.nvim/Tab bindings in nvim.
# (Helix doesn't integrate with wezterm panes; this covers splits inside Helix.)
[keys.normal]
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"
tab = "goto_next_buffer"
S-tab = "goto_previous_buffer"

[keys.insert]
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"
